name: MoltLog
options:
  bundleIdPrefix: com.shimondeitel.moltlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  MoltLog:
    type: application
    platform: iOS
    sources:
      - path: MoltLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.moltlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: MoltLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  MoltLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MoltLogTests
      - path: MoltLog.storekit
    dependencies:
      - target: MoltLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.moltlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  MoltLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: MoltLogUITests
    dependencies:
      - target: MoltLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.moltlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  MoltLog:
    build:
      targets:
        MoltLog: all
        MoltLogTests: [test]
        MoltLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: MoltLog.storekit
    test:
      config: Debug
      storeKitConfiguration: MoltLog.storekit
      targets:
        - MoltLogTests
        - MoltLogUITests
    archive:
      config: Release
